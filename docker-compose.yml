services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: threesixtynepal-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: 360binayak1234
      CLIENT_ORIGIN: http://localhost:3000
      API_BASE_URL: http://localhost:4000
    volumes:
      - server_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: threesixtynepal-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://server:4000
      JWT_SECRET: 360binayak1234
      NEXT_PUBLIC_API_URL: https://360nepal.com
      NEXT_PUBLIC_IMAGE_BASE_URL: https://360nepal.com
    depends_on:
      server:
        condition: service_healthy

volumes:
  server_uploads:
